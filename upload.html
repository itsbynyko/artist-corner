<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Arte - Artist Corner</title>

<link rel="stylesheet" href="style.css">
<style>
  /* === AQUÍ AGREGAMOS EL MISMO MORADO DE TU INDEX === */
  body {
      background-color: #513159;
      margin: 0;
  }

  /* Estilo sencillo para alinear la casilla y su etiqueta */
  .nsfw-upload-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 15px 0;
      user-select: none;
      cursor: pointer;
  }
  .nsfw-upload-container input {
      width: 18px;
      height: 18px;
      cursor: pointer;
  }
  .nsfw-upload-label {
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
  }

  /* Aviso de formato para los tags */
  .tags-notice {
      font-size: 11px;
      color: #a29bfe;
      margin-top: 4px;
      margin-bottom: 12px;
      font-family: sans-serif;
      line-height: 1.4;
  }
</style>
</head>
<body>

<header class="topbar">
    <div class="left-section">
        <div class="logo">
            <img src="ArtistCornerLogo.png" alt="Logo">
        </div>
        <nav class="menu">
            <a href="index.html">Inicio</a>
        </nav>
    </div>
</header>

<main class="upload-container">
    <div class="upload-card">
        <h1>Subir Arte</h1>

        <div class="upload-preview-container">
            <img id="preview" class="preview">
            <div id="preview-placeholder" class="preview-placeholder">
                Vista previa de la imagen
            </div>
        </div>

        <label class="upload-label">Título (Máx. 50 car.)</label>
        <input type="text" id="title" maxlength="50" placeholder="Título de la obra">

        <label class="upload-label">Autor (Máx. 30 car.)</label>
        <input type="text" id="author" maxlength="30" placeholder="Tu nombre artístico">

        <label class="upload-label">Tags (Máx. 100 car.)</label>
        <input type="text" id="tags" maxlength="100" placeholder="Ej. male, day, red.">
        <div class="tags-notice">
            💡 El sistema organizará automáticamente tus tags al formato correcto: <b>tag 1, tag 2, tag 3</b>.
        </div>

        <label class="upload-label">Descripción corta (Máx. 250 car.)</label>
        <textarea id="description" maxlength="250" placeholder="Un mensaje breve, redes sociales, detalles de la obra..."></textarea>

        <label class="upload-label">Archivo</label>
        <input type="file" id="imageUpload" accept="image/*">

        <label class="nsfw-upload-container">
            <input type="checkbox" id="nsfwUploadCheck">
            <span class="nsfw-upload-label">Marque unicamente si es NSFW</span>
        </label>

        <button id="uploadBtn" onclick="uploadImage()">
            Enviar para revisión
        </button>
    </div>
</main>

<script>
document.getElementById("imageUpload").addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        const preview = document.getElementById("preview");
        const placeholder = document.getElementById("preview-placeholder");

        preview.src = e.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
    };
    reader.readAsDataURL(file);
});

async function uploadImage() {
    const button = document.getElementById("uploadBtn");
    
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const tagsInput = document.getElementById("tags").value.trim();
    const description = document.getElementById("description").value.trim();
    const file = document.getElementById("imageUpload").files[0];
    const isNsfw = document.getElementById("nsfwUploadCheck").checked;

    // ==========================================
    // VALIDACIONES CON LOS NUEVOS LÍMITES AMPLIADOS
    // ==========================================
    if (!title) {
        alert("Error: Por favor, escribe un título.");
        document.getElementById("title").focus();
        return;
    }
    if (title.length > 50) {
        alert("Error: El título no puede superar los 50 caracteres.");
        document.getElementById("title").focus();
        return;
    }

    if (!author) {
        alert("Error: Por favor, especifica el Autor.");
        document.getElementById("author").focus();
        return;
    }
    if (author.length > 30) {
        alert("Error: El autor no puede superar los 30 caracteres.");
        document.getElementById("author").focus();
        return;
    }

    if (!tagsInput) {
        alert("Error: Introduce al menos un tag.");
        document.getElementById("tags").focus();
        return;
    }
    if (tagsInput.length > 100) {
        alert("Error: Los tags no pueden superar los 100 caracteres.");
        document.getElementById("tags").focus();
        return;
    }

    if (description.length > 250) {
        alert("Error: La descripción no puede superar los 250 caracteres.");
        document.getElementById("description").focus();
        return;
    }

    if (!file) {
        alert("Error: Debes cargar una imagen.");
        document.getElementById("imageUpload").focus();
        return;
    }

    // ==========================================
    // PROCESAMIENTO FILTRO UNIVERSAL DE TAGS
    // ==========================================
    let rawTags = tagsInput;

    // 1. Si el usuario pegó hashtags seguidos de espacios (ej: "#tag 1 #tag2"), 
    // metemos una coma intermedia justo antes de cada '#' para no perder la separación.
    rawTags = rawTags.replace(/\s+(?=#)/g, ',');

    // 2. Eliminamos de raíz todos los símbolos '#' del texto
    rawTags = rawTags.replace(/#/g, '');

    // 3. Reducimos espacios gigantes o tabulaciones a un solo espacio
    rawTags = rawTags.replace(/[\s\t]+/g, ' ');

    // 4. Convertimos los tags en un array separando por comas para su limpieza individual
    let tagArray = rawTags.split(',');
    let finalTagsArray = [];
    
    tagArray.forEach(tag => {
        let cleanTag = tag.trim();
        if (cleanTag === "") return;

        // Lista de marcas protegidas para evitar que se dividan por sus espacios internos
        const marcasProtegidas = ["brawl stars", "helluva boss", "friday night funkin", "my little pony", "pokemon go", "cookie run"];
        let lowerTag = cleanTag.toLowerCase();

        // Evaluamos si el bloque actual contiene alguna de las palabras clave protegidas
        let esCompuestoProtegido = marcasProtegidas.some(marca => lowerTag.includes(marca));

        if (esCompuestoProtegido) {
            finalTagsArray.push(cleanTag);
        } else {
            // Si no contiene marcas protegidas y tiene espacios sueltos (ej: "tag3 tag4"),
            // los separamos de forma individual.
            let subTags = cleanTag.split(' ');
            subTags.forEach(sub => {
                if (sub.trim() !== "") finalTagsArray.push(sub.trim());
            });
        }
    });

    // 5. Volvemos a armar la cadena separada estrictamente por comas y espacios limpios
    let processedTags = finalTagsArray.join(', ');

    if (!processedTags) {
        alert("Error: Los tags ingresados no son válidos.");
        document.getElementById("tags").focus();
        return;
    }

    button.disabled = true;
    button.textContent = "Enviando...";

    const reader = new FileReader();
    reader.onload = async function() {
        try {
            const base64 = reader.result.split(",")[1];

            const response = await fetch(
                "https://script.google.com/macros/s/AKfycbz0PFz6GvhKuQQzW0VA1jbevUyGgyUur51g-7tsv9zBdXcI-EzdXGaVNw2JqU5qaRGM/exec",
                {
                    method: "POST",
                    body: JSON.stringify({
                        fileName: file.name,
                        mimeType: file.type,
                        image: base64,
                        title: title,
                        author: author,
                        tags: processedTags, // Enviamos la cadena formateada perfectamente
                        description: description,
                        nsfw: isNsfw
                    })
                }
            );

            const result = await response.json();

            if (result.success) {
                button.textContent = "Enviado ✓";
                alert("¡Imagen enviada para revisión de forma exitosa!");
                window.location.href = "index.html";
                return;
            } else {
                button.disabled = false;
                button.textContent = "Enviar para revisión";
                alert("Error en el servidor: " + result.error);
            }

        } catch (error) {
            console.error(error);
            button.disabled = false;
            button.textContent = "Enviar para revisión";
            alert("Error al conectar con el servidor.");
        }
    };

    reader.readAsDataURL(file);
}
</script>
</body>
</html>
