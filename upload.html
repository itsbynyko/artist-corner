<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Arte - Artist Corner</title>

<link rel="stylesheet" href="style.css">
<style>
  /* === AQUÍ AGREGAMOS EL MISMO MORADO DE TU INDEX === */
  body {
      background-color: #513159;
      margin: 0;
  }

  /* Estilo sencillo para alinear la casilla y su etiqueta */
  .nsfw-upload-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 15px 0;
      user-select: none;
      cursor: pointer;
  }
  .nsfw-upload-container input {
      width: 18px;
      height: 18px;
      cursor: pointer;
  }
  .nsfw-upload-label {
      font-size: 14px;
      color: #ccc;
      cursor: pointer;
  }
</style>
</head>
<body>

<header class="topbar">
    <div class="left-section">
        <div class="logo">
            <img src="ArtistCornerLogo.png" alt="Logo">
        </div>
        <nav class="menu">
            <a href="index.html">Inicio</a>
        </nav>
    </div>
</header>

<main class="upload-container">
    <div class="upload-card">
        <h1>Subir Arte</h1>

        <div class="upload-preview-container">
            <img id="preview" class="preview">
            <div id="preview-placeholder" class="preview-placeholder">
                Vista previa de la imagen
            </div>
        </div>

        <label class="upload-label">Título (Máx. 25 car.)</label>
        <input type="text" id="title" maxlength="25" placeholder="Título de la obra">

        <label class="upload-label">Autor (Máx. 20 car.)</label>
        <input type="text" id="author" maxlength="20" placeholder="Tu nombre artístico">

        <label class="upload-label">Tags (Máx. 40 car.)</label>
        <input type="text" id="tags" maxlength="40" placeholder="Ej. fanart,female,pokemon">

        <label class="upload-label">Descripción corta (Máx. 80 car.)</label>
        <textarea id="description" maxlength="80" placeholder="Un mensaje muy breve o tu red social..."></textarea>

        <label class="upload-label">Archivo</label>
        <input type="file" id="imageUpload" accept="image/*">

        <label class="nsfw-upload-container">
            <input type="checkbox" id="nsfwUploadCheck">
            <span class="nsfw-upload-label">Marque unicamente si es NSFW</span>
        </label>

        <button id="uploadBtn" onclick="uploadImage()">
            Enviar para revisión
        </button>
    </div>
</main>

<script>
document.getElementById("imageUpload").addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        const preview = document.getElementById("preview");
        const placeholder = document.getElementById("preview-placeholder");

        preview.src = e.target.result;
        preview.style.display = "block";
        placeholder.style.display = "none";
    };
    reader.readAsDataURL(file);
});

async function uploadImage() {
    const button = document.getElementById("uploadBtn");
    
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const tags = document.getElementById("tags").value.trim();
    const description = document.getElementById("description").value.trim();
    const file = document.getElementById("imageUpload").files[0];
    const isNsfw = document.getElementById("nsfwUploadCheck").checked;

    // ==========================================
    // VALIDACIONES CON LOS NUEVOS LÍMITES CORTOS
    // ==========================================
    if (!title) {
        alert("Error: Por favor, escribe un título.");
        document.getElementById("title").focus();
        return;
    }
    if (title.length > 25) {
        alert("Error: El título no puede superar los 25 caracteres.");
        document.getElementById("title").focus();
        return;
    }

    if (!author) {
        alert("Error: Por favor, especifica el Autor.");
        document.getElementById("author").focus();
        return;
    }
    if (author.length > 20) {
        alert("Error: El autor no puede superar los 20 caracteres.");
        document.getElementById("author").focus();
        return;
    }

    if (!tags) {
        alert("Error: Introduce al menos un tag.");
        document.getElementById("tags").focus();
        return;
    }
    if (tags.length > 40) {
        alert("Error: Los tags no pueden superar los 40 caracteres.");
        document.getElementById("tags").focus();
        return;
    }

    if (description.length > 80) {
        alert("Error: La descripción no puede superar los 80 caracteres.");
        document.getElementById("description").focus();
        return;
    }

    if (!file) {
        alert("Error: Debes cargar una imagen.");
        document.getElementById("imageUpload").focus();
        return;
    }

    button.disabled = true;
    button.textContent = "Enviando...";

    const reader = new FileReader();
    reader.onload = async function() {
        try {
            const base64 = reader.result.split(",")[1];

            const response = await fetch(
                "https://script.google.com/macros/s/AKfycbydVYcMLTzmPdN_fiJLsIGmaiD8epWYI8HrDLlYaoqQhvE_jYEhY_4KRGaNpZMpgaNb/exec",
                {
                    method: "POST",
                    body: JSON.stringify({
                        fileName: file.name,
                        mimeType: file.type,
                        image: base64,
                        title: title,
                        author: author,
                        tags: tags,
                        description: description,
                        nsfw: isNsfw
                    })
                }
            );

            const result = await response.json();

            if (result.success) {
                button.textContent = "Enviado ✓";
                alert("¡Imagen enviada para revisión de forma exitosa!");
                window.location.href = "index.html";
                return;
            } else {
                button.disabled = false;
                button.textContent = "Enviar para revisión";
                alert("Error en el servidor: " + result.error);
            }

        } catch (error) {
            console.error(error);
            button.disabled = false;
            button.textContent = "Enviar para revisión";
            alert("Error al conectar con el servidor.");
        }
    };

    reader.readAsDataURL(file);
}
</script>
</body>
</html>
