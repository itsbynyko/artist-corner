<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Corner</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ESTADO POR DEFECTO: FONDO MORADO */
  body {
      background-color: #513159; 
      transition: background-color 0.5s ease; 
      margin: 0;
  }

  /* ESTADO AL ACTIVAR LA CASILLA: FADE A NEGRO / GRIS OSCURO */
  body.nsfw-mode {
      background-color: #121212; 
  }

  /* ANIMACIÓN DE ENTRADA PARA LAS TARJETAS */
  @keyframes fadeInCard {
      0% {
          opacity: 0;
          transform: translateY(20px);
      }
      100% {
          opacity: 1;
          transform: translateY(0);
      }
  }

  /* REGLA PARA LAS TARJETAS DE PUBLICACIÓN */
  .card {
      opacity: 0; 
      animation: fadeInCard 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }

  .nsfw-control {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      user-select: none;
      cursor: pointer;
      margin-left: 15px;
  }
  .nsfw-control input {
      cursor: pointer;
      width: 16px;
      height: 16px;
  }

  /* ESTILOS PARA LA INFORMACIÓN DEL LIGHTBOX (PC) */
  .lightbox-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: sans-serif;
      max-width: 320px;
      z-index: 10005;
      text-align: left;
      border-left: 4px solid #8e44ad;
  }
  .lightbox-info .lb-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #fff;
  }
  .lightbox-info .lb-author {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 8px;
  }
  
  .lightbox-info .lb-tags {
      font-size: 12px;
      color: #888;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
  }
  
  .lightbox-info .tag-badge {
      background: #222;
      color: #a29bfe;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, color 0.2s;
      pointer-events: auto;
  }
  .lightbox-info .tag-badge:hover {
      background: #8e44ad;
      color: #fff;
  }

  /* BOTÓN DE ESTRELLA EN LAS TARJETAS */
  .star-btn {
      background: #eeeeee; 
      border: none;
      color: #888888; 
      width: 36px;
      height: 36px;
      border-radius: 50%; 
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 18px;
      user-select: none;
      flex-shrink: 0; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .star-btn:hover {
      transform: scale(1.1);
      background: #e5e5e5;
      color: #f1c40f; 
  }
  .star-btn.starred {
      background: #eeeeee; 
      color: #f1c40f; 
      animation: popEffect 0.3s ease-in-out;
  }

  .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px; 
      width: 100%;
  }

  @keyframes popEffect {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
  }

  .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      overflow-y: auto; 
  }

  /* BOTÓN DE CARGA INFERIOR */
  .load-more-container {
      text-align: center;
      padding: 25px 0;
      width: 100%;
      clear: both;
  }
  .load-btn {
      background: #8e44ad; 
      color: white;
      border: none;
      padding: 12px 35px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
      transition: background 0.2s, transform 0.1s;
  }
  .load-btn:hover {
      background: #732d91; 
  }
  .load-btn:active {
      transform: scale(0.98); 
  }

  /* SPINNER ANIMADO PARA EL FEED Y EL LIGHTBOX */
  .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #8e44ad; 
      animation: spin 1s linear infinite;
      margin: 20px auto;
  }
  @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
  }

  /* CONTENEDOR DE CARGA CENTRADO EN MEDIO DE LA PANTALLA */
  .loading-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #bbb;
      font-family: sans-serif;
      z-index: 999;
      pointer-events: none; 
  }

  /* VENTANA MODAL PARA EL AVISO +18 */
  .nsfw-modal {
      display: none; 
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 100000;
      font-family: sans-serif;
  }
  .nsfw-modal-content {
      background: #221526;
      border: 2px solid #e74c3c;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      color: #fff;
  }
  .nsfw-modal-title {
      font-size: 22px;
      font-weight: bold;
      color: #e74c3c;
      margin-bottom: 12px;
  }
  .nsfw-modal-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #e0e0e0;
  }
  .nsfw-modal-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
  }
  .nsfw-btn {
      padding: 11px 28px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
  }
  .nsfw-btn-continue {
      background: #e74c3c;
      color: white;
  }
  .nsfw-btn-continue:hover { background: #c0392b; }
  .nsfw-btn-exit {
      background: #444;
      color: #ddd;
  }
  .nsfw-btn-exit:hover { background: #555; color: #fff; }
  .nsfw-btn:active { transform: scale(0.97); }

  /* SOLUCIÓN MÓVIL DISPOSITIVOS (MAX 768PX) */
  @media (max-width: 768px) {
      body {
          padding: 10px !important; 
      }

      .topbar {
          flex-direction: column !important; 
          height: auto !important; 
          padding: 15px !important;
          gap: 15px !important;
      }

      .left-section {
          width: 100% !important;
          justify-content: space-between !important; 
          gap: 10px !important;
      }

      .logo img {
          width: 150px !important; 
          height: auto !important;
      }

      .menu {
          gap: 12px !important; 
          flex-wrap: wrap !important;
      }

      .menu a {
          font-size: 14px !important;
          white-space: nowrap !important; 
      }

      .search-box {
          width: 100% !important; 
          max-width: 100% !important; 
          display: flex !important;
          align-items: center !important;
          justify-content: space-between !important;
          gap: 10px !important;
      }

      .search-box input {
          flex-grow: 1 !important; 
          width: auto !important;
          padding: 10px 15px !important;
          font-size: 14px !important;
      }

      .nsfw-control {
          margin-left: 0 !important; 
          flex-shrink: 0 !important; 
          white-space: nowrap !important;
      }

      .feed {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; 
          gap: 10px !important;
      }

      .card .info {
          padding: 10px !important;
      }

      .title {
          font-size: 14px !important;
      }

      .author {
          font-size: 12px !important;
       }

      .card .star-btn {
          width: 30px !important;
          height: 30px !important;
          font-size: 14px !important;
      }

      .lightbox {
          flex-direction: column !important; 
          justify-content: flex-start !important; 
          padding: 20px 10px !important;
      }

      .lightbox img {
          max-width: 100% !important;
          max-height: 60vh !important; 
          object-fit: contain !important;
          margin-top: auto;
          margin-bottom: 20px;
      }

      .lightbox-info {
          position: relative !important; 
          left: 0 !important;
          bottom: 0 !important;
          right: 0 !important;
          width: 100% !important;
          max-width: 450px !important; 
          margin: 0 auto auto auto !important; 
          background: #1a1a1a !important; 
          box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
          border-left: 4px solid #8e44ad !important;
          padding: 15px !important;
          box-sizing: border-box !important;
      }

      .nav-btn {
          position: fixed !important;
          top: 35% !important; 
          width: 45px !important;
          height: 45px !important;
          font-size: 18px !important;
          background: rgba(0,0,0,0.6) !important;
          border: 1px solid rgba(255,255,255,0.2) !important;
      }
      .left { left: 5px !important; }
      .right { right: 5px !important; }
  }
</style>
</head>
<body>

<header class="topbar">
    <div class="left-section">
        <div class="logo">
            <img src="ArtistCornerLogo.png" alt="Logo">
        </div>
        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="rules.html">Reglas</a>
            <a href="upload.html">Subir Arte</a>
            <a href="info.html">Información</a>
        </nav>
    </div>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Buscar por título, autor o tag...">
        
        <label class="nsfw-control">
            <input type="checkbox" id="nsfwToggle">
            <span>NSFW</span>
        </label>
    </div>
</header>

<div class="loading-wrapper" id="loading-container">
    <div class="spinner"></div>
    <div style="font-size: 14px; letter-spacing: 0.5px;">Conectando con la galería...</div>
</div>

<div class="feed" id="feed"></div>

<div class="load-more-container">
    <button id="loadMoreBtn" class="load-btn" style="display: none;" onclick="loadNextBatch()">Ver más obras</button>
</div>

<div class="lightbox" id="lightbox">
    <button class="nav-btn left" onclick="prevImage(event)">❮</button>
    <img id="lightboxImg">
    <button class="nav-btn right" onclick="nextImage(event)">❯</button>

    <div class="lightbox-info" id="lightboxInfo">
        <div class="lb-title" id="lbTitle">Título</div>
        <div class="lb-author" id="lbAuthor">Autor</div>
        <div class="lb-tags" id="lbTags"></div>
    </div>
</div>

<div class="nsfw-modal" id="nsfwModal">
    <div class="nsfw-modal-content">
        <div class="nsfw-modal-title">NSFW</div>
        <div class="nsfw-modal-text">Este contenido es para +18, al aceptar usted confirma que tiene por lo menos 18 años de edad.</div>
        <div class="nsfw-modal-buttons">
            <button class="nsfw-btn nsfw-btn-continue" id="nsfwContinueBtn">Continuar</button>
            <button class="nsfw-btn nsfw-btn-exit" id="nsfwExitBtn">Salir</button>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbzcwKYtpAnlFnZOSS7-jbQ2cDeiyZThmojE28E-YxmMnTaiegmmnnrmS_7q-NIX4l_q/exec";

let imageList = []; 
let currentImageIndex = 0;
let allPosts = []; 
let filteredPosts = [];
let searchTimeout;

let currentPointer = 0;
let initialBatchSize = 6;  
const BATCH_SIZE = 12;     
let isSequenceActive = false;

let currentCacheVersion = "stable";

// Control en memoria volátil: se reinicia siempre al refrescar con F5
let yaAceptoNsfw = false; 

// SE ASEGURA DE QUE EL CHECKBOX SIEMPRE EMPIECE DESACTIVADO TRAS CARGAR LA PÁGINA
const nsfwToggle = document.getElementById("nsfwToggle");
nsfwToggle.checked = false;

async function loadFeed() {
    try {
        const res = await fetch(`${API_BASE}?action=list`, {
            method: "GET",
            redirect: "follow"
        });
        
        if (!res.ok) throw new Error("Error de red");
        allPosts = await res.json();
        
        filterAndRender();
        
    } catch (err) {
        console.error("Error cargando backend:", err);
        const loader = document.getElementById("loading-container");
        if(loader) {
            loader.innerHTML = '<div style="text-align:center; color:#e74c3c; padding:50px; width:100%;">Error al conectar con la galería de Artist Corner.</div>';
        }
    }
}

function getStarredImages() {
    const stars = localStorage.getItem("artist_corner_likes");
    return stars ? JSON.parse(stars) : [];
}

function isImageStarred(fileId) {
    return getStarredImages().includes(fileId);
}

function toggleStar(fileId) {
    let starredImages = getStarredImages();
    if (starredImages.includes(fileId)) {
        starredImages = starredImages.filter(id => id !== fileId); 
    } else {
        starredImages.push(fileId); 
    }
    localStorage.setItem("artist_corner_likes", JSON.stringify(starredImages));
}

function filterAndRender() {
    isSequenceActive = false; 

    const feed = document.getElementById("feed");
    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const showNsfwOnly = nsfwToggle.checked;

    if (showNsfwOnly) {
        document.body.classList.add("nsfw-mode");
    } else {
        document.body.classList.remove("nsfw-mode");
    }

    feed.innerHTML = ""; 
    imageList = []; 
    currentPointer = 0;

    if (!allPosts || allPosts.length === 0) {
        document.getElementById("loadMoreBtn").style.display = "none";
        return;
    }

    filteredPosts = allPosts.filter(post => {
        const tagsString = (post.tags || "").toLowerCase();
        const isPostNsfw = post.nsfw === true || tagsString.includes("nsfw");

        if (showNsfwOnly && !isPostNsfw) return false;
        if (!showNsfwOnly && isPostNsfw) return false;

        if (search) {
            const title = (post.title || "").toLowerCase();
            const author = (post.author || "").toLowerCase();
            return title.includes(search) || author.includes(search) || tagsString.includes(search);
        }
        return true;
    });

    if (filteredPosts.length === 0) {
        document.getElementById("loadMoreBtn").style.display = "none";
        return;
    }

    isSequenceActive = true;
    loadNextBatch();
}

function loadNextBatch() {
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    loadMoreBtn.style.display = "none";

    const loader = document.getElementById("loading-container");
    if (loader && filteredPosts.length > 0) {
        loader.style.display = "none";
    }

    let currentBatchLimit = (currentPointer === 0) ? initialBatchSize : BATCH_SIZE;
    const end = Math.min(currentPointer + currentBatchLimit, filteredPosts.length);
    const batch = filteredPosts.slice(currentPointer, end);
    
    currentPointer = end;

    for (let i = 0; i < batch.length; i++) {
        if (!isSequenceActive) return; 
        renderCardSingle(batch[i], currentBatchLimit);
    }

    if (currentPointer < filteredPosts.length && isSequenceActive) {
        loadMoreBtn.style.display = "inline-block";
    }
}

function renderCardSingle(post, currentBatchLimit) {
    const feed = document.getElementById("feed");
    const tagsString = (post.tags || "").toLowerCase();
    const isPostNsfw = post.nsfw === true || tagsString.includes("nsfw");
    const title = post.title || "Sin título";
    const author = post.author || "Anónimo";

    const isGif = (post.mimeType && post.mimeType.includes("image/gif")) || 
                  (post.filename && post.filename.toLowerCase().endsWith(".gif")) ||
                  tagsString.includes("gif");

    let imgUrl;
    if (isGif) {
        imgUrl = `https://drive.google.com/uc?export=view&id=${post.fileId}&v=${currentCacheVersion}`;
    } else {
        imgUrl = `https://drive.google.com/thumbnail?id=${post.fileId}&sz=w1000&v=${currentCacheVersion}`;
    }
    
    imageList.push({
        id: post.fileId,
        url: imgUrl, 
        title: title,
        author: author,
        tags: post.tags || ""
    });

    let feedThumbUrl = `https://drive.google.com/thumbnail?id=${post.fileId}&sz=w250&v=${currentCacheVersion}`;

    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-nsfw", isPostNsfw); 
    card.style.animationDelay = `${(imageList.length % currentBatchLimit) * 0.03}s`;

    const hasStar = isImageStarred(post.fileId);
    const imgIndex = imageList.length - 1;

    card.innerHTML = `
        <div class="video-container">
            <img
                alt="${title}"
                loading="lazy"
                src="${feedThumbUrl}"
                onclick="openImage(${imgIndex})">
        </div>
        <div class="info">
            <div class="title-row">
                <div class="title" style="display:flex; align-items:center; flex-wrap:wrap; font-weight:bold;">
                    ${title} 
                    ${isPostNsfw ? '<span style="color:#e74c3c; font-size:10px; font-weight:bold; border:1px solid #e74c3c; padding:1px 3px; border-radius:3px; margin-left:5px;">18+</span>' : ''}
                </div>
                <button class="star-btn ${hasStar ? 'starred' : ''}" onclick="handleCardStar(event, '${post.fileId}', this)">★</button>
            </div>
            <div class="author">Por: ${author}</div>
            ${post.description ? `<div style="font-size:12px; color:#888; margin-top:5px;">${post.description}</div>` : ''}
        </div>
    `;
    
    feed.appendChild(card);
}

function handleCardStar(event, fileId, element) {
    event.stopPropagation(); 
    toggleStar(fileId);
    element.classList.toggle("starred");
}

function filterByTag(tagName) {
    document.getElementById("lightbox").style.display = "none";
    const searchInput = document.getElementById("searchInput");
    searchInput.value = tagName.trim();
    searchInput.focus();
    filterAndRender();
}

document.getElementById("searchInput").addEventListener("input", () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(filterAndRender, 300);
});


/* ====================================================================
    INTERCEPTOR DE ADVERTENCIA +18
======================================================================= */
const nsfwModal = document.getElementById("nsfwModal");
const nsfwContinueBtn = document.getElementById("nsfwContinueBtn");
const nsfwExitBtn = document.getElementById("nsfwExitBtn");

nsfwToggle.addEventListener("click", function(e) {
    if (this.checked && !yaAceptoNsfw) {
        e.preventDefault();              
        nsfwModal.style.display = "flex"; 
    } else {
        filterAndRender();
    }
});

nsfwContinueBtn.addEventListener("click", () => {
    yaAceptoNsfw = true;              
    nsfwModal.style.display = "none"; 
    nsfwToggle.checked = true;                       
    filterAndRender();                               
});

nsfwExitBtn.addEventListener("click", () => {
    nsfwModal.style.display = "none";                
    nsfwToggle.checked = false;                      
    filterAndRender();                               
});


/* ==========================================
   MÓDULO DE LIGHTBOX
========================================== */
const lightboxImg = document.getElementById("lightboxImg");

function clearLightboxImage() {
    lightboxImg.style.display = "none"; 
    lightboxImg.src = ""; 
}

const preloadImage = new Image(); 

function updateLightboxContent(index) {
    const imageData = imageList[index];
    if (!imageData) return;

    clearLightboxImage();

    document.getElementById("lbTitle").textContent = imageData.title;
    document.getElementById("lbAuthor").textContent = `Por: ${imageData.author}`;

    const tagsContainer = document.getElementById("lbTags");
    tagsContainer.innerHTML = ""; 
    
    if (imageData.tags) {
        let rawTags = imageData.tags.trim();
        let cleanTagsString = "";

        if (rawTags.includes(",")) {
            cleanTagsString = rawTags.replace(/#/g, '');
        } 
        else if (rawTags.includes("#")) {
            cleanTagsString = rawTags.replace(/\s+(?=#)/g, ',');
            cleanTagsString = cleanTagsString.replace(/#/g, '');
        } 
        else {
            cleanTagsString = rawTags.replace(/[\s]+/g, ',');
        }

        const tagArray = cleanTagsString.split(",");
        
        tagArray.forEach(tag => {
            const cleanTag = tag.trim();
            if (cleanTag === "") return; 
            
            const tagSpan = document.createElement("span");
            tagSpan.className = "tag-badge";
            tagSpan.textContent = `#${cleanTag}`;
            
            tagSpan.onclick = function(event) {
                event.stopPropagation();
                filterByTag(cleanTag);
            };
            tagsContainer.appendChild(tagSpan);
        });
    } else {
        tagsContainer.textContent = "Sin etiquetas";
    }

    lightboxImg.onload = function() {
        lightboxImg.style.display = "block"; 
    };
    lightboxImg.src = imageData.url; 

    const nextIndex = (index + 1) % imageList.length;
    const nextImageData = imageList[nextIndex];
    if(nextImageData) {
        preloadImage.src = nextImageData.url; 
    }
}

function openImage(index){
    currentImageIndex = index;
    updateLightboxContent(index);
    document.getElementById("lightbox").style.display = "flex";
}

function nextImage(event){
    event.stopPropagation();
    if (imageList.length === 0) return;
    currentImageIndex = (currentImageIndex + 1) % imageList.length;
    updateLightboxContent(currentImageIndex);
}

function prevImage(event){
    event.stopPropagation();
    if (imageList.length === 0) return;
    currentImageIndex = (currentImageIndex - 1 + imageList.length) % imageList.length;
    updateLightboxContent(currentImageIndex);
}

document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target.closest('.lightbox-info') || e.target.closest('.nav-btn')) return;
    document.getElementById("lightbox").style.display = "none";
});

document.addEventListener("keydown", e => {
    const lightbox = document.getElementById("lightbox");
    if (lightbox.style.display !== "flex") return;

    if (e.key === "ArrowRight") nextImage(e);
    if (e.key === "ArrowLeft") prevImage(e);
    if (e.key === "Escape") lightbox.style.display = "none";
});

loadFeed();
</script>

</body>
</html>
